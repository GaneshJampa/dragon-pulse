<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <rect width="300" height="400" fill="#FBF3E2"/>
  <line x1="0" y1="348" x2="300" y2="348" stroke="#C9B37E" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>

  <!-- Figure: partial squat descent -->
  <!-- Head slightly lower -->
  <circle cx="150" cy="88" r="20" fill="#2A1810"/>
  <ellipse cx="150" cy="73" rx="20" ry="13" fill="#111"/>
  <!-- Neck -->
  <rect x="143" y="105" width="14" height="16" rx="4" fill="#2A1810"/>
  <!-- Torso — angled slightly forward -->
  <path d="M 132 120 L 168 120 L 173 188 L 127 188 Z" fill="#2A1810"/>
  <!-- Shorts -->
  <path d="M 127 185 L 173 185 L 178 228 L 122 228 Z" fill="#C9B37E"/>
  <!-- Left thigh angled outward (descending) -->
  <path d="M 127 228 L 108 310 L 126 310 L 148 228 Z" fill="#2A1810"/>
  <!-- Right thigh -->
  <path d="M 152 228 L 174 228 L 192 310 L 178 310 Z" fill="#2A1810"/>
  <!-- Lower legs (calves straight down) -->
  <rect x="108" y="308" width="18" height="40" rx="5" fill="#2A1810"/>
  <rect x="178" y="308" width="18" height="40" rx="5" fill="#2A1810"/>

  <!-- Arms out gripping bar -->
  <path d="M 132 125 L 80 122" stroke="#2A1810" stroke-width="16" stroke-linecap="round"/>
  <path d="M 168 125 L 220 122" stroke="#2A1810" stroke-width="16" stroke-linecap="round"/>

  <!-- Barbell across upper back -->
  <line x1="50" y1="120" x2="250" y2="120" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <circle cx="57" cy="120" r="13" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="57" cy="120" r="7" fill="#666"/>
  <circle cx="243" cy="120" r="13" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="243" cy="120" r="7" fill="#666"/>

  <!-- Descent arrow -->
  <path d="M 150 340 L 150 360" stroke="#C9B37E" stroke-width="2" marker-end="url(#arr)" opacity="0.6"/>

  <text x="150" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B7355" letter-spacing="1">STEP 2 — DESCEND</text>
</svg>
