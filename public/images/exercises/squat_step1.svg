<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <rect width="300" height="400" fill="#FBF3E2"/>
  <line x1="0" y1="348" x2="300" y2="348" stroke="#C9B37E" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>

  <!-- Figure: standing upright, bar on upper back -->
  <!-- Head -->
  <circle cx="150" cy="72" r="20" fill="#2A1810"/>
  <ellipse cx="150" cy="57" rx="20" ry="13" fill="#111"/>
  <!-- Neck -->
  <rect x="143" y="90" width="14" height="18" rx="4" fill="#2A1810"/>
  <!-- Torso -->
  <rect x="128" y="106" width="44" height="78" rx="6" fill="#2A1810"/>
  <!-- Shorts -->
  <rect x="126" y="181" width="48" height="44" rx="6" fill="#C9B37E"/>
  <!-- Left thigh -->
  <rect x="126" y="222" width="21" height="86" rx="6" fill="#2A1810"/>
  <!-- Right thigh -->
  <rect x="153" y="222" width="21" height="86" rx="6" fill="#2A1810"/>
  <!-- Calves -->
  <rect x="127" y="305" width="18" height="43" rx="5" fill="#2A1810"/>
  <rect x="155" y="305" width="18" height="43" rx="5" fill="#2A1810"/>

  <!-- Arms out to sides gripping bar on back -->
  <path d="M 128 115 L 80 118" stroke="#2A1810" stroke-width="16" stroke-linecap="round"/>
  <path d="M 172 115 L 220 118" stroke="#2A1810" stroke-width="16" stroke-linecap="round"/>

  <!-- Barbell across upper back -->
  <line x1="50" y1="115" x2="250" y2="115" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <circle cx="57" cy="115" r="13" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="57" cy="115" r="7" fill="#666"/>
  <circle cx="243" cy="115" r="13" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="243" cy="115" r="7" fill="#666"/>

  <text x="150" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B7355" letter-spacing="1">STEP 1 — BAR ON BACK</text>
</svg>
