<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <rect width="300" height="400" fill="#FBF3E2"/>
  <line x1="0" y1="348" x2="300" y2="348" stroke="#C9B37E" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>

  <!-- Standing figure, arms curled at 90° -->
  <circle cx="150" cy="72" r="20" fill="#2A1810"/>
  <ellipse cx="150" cy="57" rx="20" ry="13" fill="#111"/>
  <rect x="143" y="90" width="14" height="16" rx="4" fill="#2A1810"/>
  <rect x="130" y="104" width="40" height="74" rx="6" fill="#2A1810"/>
  <rect x="128" y="175" width="44" height="42" rx="6" fill="#C9B37E"/>
  <rect x="128" y="214" width="20" height="88" rx="5" fill="#2A1810"/>
  <rect x="152" y="214" width="20" height="88" rx="5" fill="#2A1810"/>
  <rect x="129" y="300" width="17" height="48" rx="5" fill="#2A1810"/>
  <rect x="153" y="300" width="17" height="48" rx="5" fill="#2A1810"/>

  <!-- Upper arms at sides (upper arm still vertical) -->
  <rect x="108" y="104" width="22" height="68" rx="7" fill="#2A1810"/>
  <rect x="170" y="104" width="22" height="68" rx="7" fill="#2A1810"/>
  <!-- Forearms horizontal (bent at 90°) -->
  <rect x="65" y="156" width="68" height="20" rx="7" fill="#2A1810"/>
  <rect x="167" y="156" width="68" height="20" rx="7" fill="#2A1810"/>

  <!-- Barbell at mid-curl height -->
  <line x1="52" y1="162" x2="248" y2="162" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <circle cx="59" cy="162" r="14" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="59" cy="162" r="7" fill="#666"/>
  <circle cx="241" cy="162" r="14" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="241" cy="162" r="7" fill="#666"/>

  <!-- Curl arc guide -->
  <path d="M 119 218 Q 85 190 86 162" stroke="#C9B37E" stroke-width="1.5" stroke-dasharray="4 3" fill="none" opacity="0.5"/>

  <text x="150" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B7355" letter-spacing="1">STEP 2 — CURL UP</text>
</svg>
