<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <rect width="300" height="400" fill="#FBF3E2"/>
  <line x1="0" y1="348" x2="300" y2="348" stroke="#C9B37E" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>

  <!-- Figure: torso near parallel to floor (deeper bend) -->
  <!-- Head forward -->
  <circle cx="232" cy="148" r="20" fill="#2A1810"/>
  <ellipse cx="240" cy="134" rx="20" ry="12" fill="#111"/>
  <!-- Torso now nearly horizontal -->
  <path d="M 218 165 L 148 180" stroke="#2A1810" stroke-width="32" stroke-linecap="round"/>
  <!-- Arms hanging straight down -->
  <path d="M 182 172 L 174 250" stroke="#2A1810" stroke-width="14" stroke-linecap="round"/>
  <path d="M 196 178 L 192 252" stroke="#2A1810" stroke-width="14" stroke-linecap="round"/>
  <!-- Shorts (hip area) -->
  <ellipse cx="148" cy="180" rx="22" ry="12" fill="#C9B37E"/>
  <!-- Legs straight down -->
  <rect x="136" y="190" width="20" height="90" rx="5" fill="#2A1810"/>
  <rect x="160" y="190" width="20" height="90" rx="5" fill="#2A1810"/>
  <!-- Calves -->
  <rect x="137" y="278" width="18" height="70" rx="5" fill="#2A1810"/>
  <rect x="161" y="278" width="18" height="70" rx="5" fill="#2A1810"/>

  <!-- Barbell on back (nearly horizontal) -->
  <line x1="80" y1="162" x2="270" y2="164" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <circle cx="87" cy="162" r="12" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="87" cy="162" r="6" fill="#666"/>
  <circle cx="263" cy="164" r="12" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="263" cy="164" r="6" fill="#666"/>

  <!-- Parallel floor guide line -->
  <line x1="60" y1="172" x2="270" y2="172" stroke="#C9B37E" stroke-width="1" stroke-dasharray="5 4" opacity="0.4"/>
  <text x="56" y="170" font-family="Georgia, serif" font-size="9" fill="#C9B37E" opacity="0.6">parallel</text>

  <text x="150" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B7355" letter-spacing="1">STEP 3 — NEAR PARALLEL</text>
</svg>
