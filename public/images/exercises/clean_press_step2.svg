<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <rect width="300" height="400" fill="#FBF3E2"/>
  <line x1="0" y1="348" x2="300" y2="348" stroke="#C9B37E" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>

  <!-- Figure: upright, bar at shoulders (front rack) -->
  <!-- Head -->
  <circle cx="150" cy="80" r="20" fill="#2A1810"/>
  <ellipse cx="150" cy="65" rx="20" ry="13" fill="#111"/>
  <!-- Neck -->
  <rect x="143" y="98" width="14" height="18" rx="4" fill="#2A1810"/>
  <!-- Torso -->
  <rect x="128" y="114" width="44" height="72" rx="6" fill="#2A1810"/>
  <!-- Shorts -->
  <rect x="126" y="183" width="48" height="44" rx="6" fill="#C9B37E"/>
  <!-- Left thigh -->
  <rect x="126" y="224" width="21" height="82" rx="6" fill="#2A1810"/>
  <!-- Right thigh -->
  <rect x="153" y="224" width="21" height="82" rx="6" fill="#2A1810"/>
  <!-- Left calf -->
  <rect x="128" y="304" width="18" height="44" rx="5" fill="#2A1810"/>
  <!-- Right calf -->
  <rect x="154" y="304" width="18" height="44" rx="5" fill="#2A1810"/>

  <!-- Arms in front rack — elbows up, forearms parallel to ground -->
  <!-- Left arm: elbow out left, forearm pointing center -->
  <path d="M 128 122 L 96 108 L 120 130" stroke="#2A1810" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right arm -->
  <path d="M 172 122 L 204 108 L 180 130" stroke="#2A1810" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Barbell at shoulder height -->
  <line x1="60" y1="125" x2="240" y2="125" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <circle cx="66" cy="125" r="14" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="66" cy="125" r="7" fill="#666"/>
  <circle cx="234" cy="125" r="14" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="234" cy="125" r="7" fill="#666"/>

  <text x="150" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B7355" letter-spacing="1">STEP 2 — FRONT RACK</text>
</svg>
