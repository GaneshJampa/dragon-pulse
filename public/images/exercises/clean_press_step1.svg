<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Background -->
  <rect width="300" height="400" fill="#FBF3E2"/>
  <!-- Subtle grain texture -->
  <rect width="300" height="400" fill="url(#grain)" opacity="0.06"/>
  <defs>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <rect id="grain-rect" width="300" height="400" filter="url(#grain)"/>
  </defs>
  <!-- Floor line -->
  <line x1="0" y1="348" x2="300" y2="348" stroke="#C9B37E" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>
  <!-- Weight plates on floor -->
  <ellipse cx="82" cy="348" rx="14" ry="5" fill="#8B7355" opacity="0.5"/>
  <ellipse cx="218" cy="348" rx="14" ry="5" fill="#8B7355" opacity="0.5"/>

  <!-- Figure: bent forward in deadlift start -->
  <!-- Head tilted forward -->
  <circle cx="140" cy="148" r="20" fill="#2A1810"/>
  <!-- Short black hair -->
  <ellipse cx="142" cy="133" rx="20" ry="13" fill="#111"/>
  <!-- Torso bent forward at ~45° -->
  <path d="M 140 166 L 220 220" stroke="#2A1810" stroke-width="22" stroke-linecap="round"/>
  <!-- Left arm reaching down -->
  <path d="M 150 175 L 145 250 L 155 260" stroke="#2A1810" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right arm reaching down -->
  <path d="M 160 185 L 168 258 L 178 268" stroke="#2A1810" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shorts patch (yellow) -->
  <path d="M 210 215 L 235 228 L 228 248 L 205 235 Z" fill="#C9B37E"/>
  <!-- Left leg -->
  <path d="M 215 230 L 210 348" stroke="#2A1810" stroke-width="18" stroke-linecap="round"/>
  <!-- Right leg -->
  <path d="M 228 238 L 232 348" stroke="#2A1810" stroke-width="18" stroke-linecap="round"/>
  <!-- Barbell on floor -->
  <line x1="80" y1="280" x2="220" y2="284" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <circle cx="84" cy="281" r="13" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="84" cy="281" r="7" fill="#666"/>
  <circle cx="216" cy="283" r="13" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="216" cy="283" r="7" fill="#666"/>

  <!-- Step label -->
  <text x="150" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B7355" letter-spacing="1">STEP 1 — SET POSITION</text>
</svg>
