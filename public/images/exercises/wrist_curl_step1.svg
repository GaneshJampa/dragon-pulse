<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <rect width="300" height="400" fill="#FBF3E2"/>
  <!-- Bench for seated wrist curl -->
  <rect x="55" y="268" width="190" height="16" rx="4" fill="#C9B37E" opacity="0.7"/>
  <rect x="70" y="284" width="12" height="50" rx="3" fill="#8B7355" opacity="0.5"/>
  <rect x="218" y="284" width="12" height="50" rx="3" fill="#8B7355" opacity="0.5"/>
  <line x1="0" y1="348" x2="300" y2="348" stroke="#C9B37E" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>

  <!-- Figure: seated, forearms on thighs -->
  <!-- Head -->
  <circle cx="150" cy="120" r="20" fill="#2A1810"/>
  <ellipse cx="150" cy="105" rx="20" ry="13" fill="#111"/>
  <!-- Neck -->
  <rect x="143" y="138" width="14" height="15" rx="4" fill="#2A1810"/>
  <!-- Torso (seated, slightly forward lean) -->
  <path d="M 132 152 L 168 152 L 164 268 L 136 268 Z" fill="#2A1810"/>
  <!-- Shorts on seats -->
  <path d="M 110 255 L 190 255 L 188 276 L 112 276 Z" fill="#C9B37E"/>
  <!-- Thighs horizontal (seated) -->
  <rect x="110" y="244" width="70" height="22" rx="5" fill="#2A1810" transform="rotate(-3, 145, 255)"/>
  <rect x="120" y="250" width="70" height="22" rx="5" fill="#2A1810" transform="rotate(3, 155, 261)"/>
  <!-- Lower legs going down -->
  <rect x="110" y="270" width="18" height="78" rx="5" fill="#2A1810"/>
  <rect x="172" y="270" width="18" height="78" rx="5" fill="#2A1810"/>

  <!-- Forearms resting on thighs, wrists hanging down (extended) -->
  <!-- Left forearm -->
  <rect x="76" y="232" width="58" height="18" rx="6" fill="#2A1810" transform="rotate(-8, 105, 241)"/>
  <!-- Right forearm -->
  <rect x="166" y="232" width="58" height="18" rx="6" fill="#2A1810" transform="rotate(8, 195, 241)"/>
  <!-- Hands/wrists drooped down -->
  <path d="M 76 242 L 64 270" stroke="#2A1810" stroke-width="14" stroke-linecap="round"/>
  <path d="M 224 242 L 236 270" stroke="#2A1810" stroke-width="14" stroke-linecap="round"/>

  <!-- Barbell with wrists drooped -->
  <line x1="46" y1="272" x2="254" y2="272" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <circle cx="53" cy="272" r="12" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="53" cy="272" r="6" fill="#666"/>
  <circle cx="247" cy="272" r="12" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="247" cy="272" r="6" fill="#666"/>

  <!-- Wrist drop arrow -->
  <path d="M 65 250 L 65 268" stroke="#C9B37E" stroke-width="2" stroke-dasharray="3 2" opacity="0.6"/>
  <polygon points="61,266 69,266 65,276" fill="#C9B37E" opacity="0.6"/>

  <text x="150" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B7355" letter-spacing="1">STEP 1 — WRISTS EXTENDED</text>
</svg>
