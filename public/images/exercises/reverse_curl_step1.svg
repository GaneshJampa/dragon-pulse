<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <rect width="300" height="400" fill="#FBF3E2"/>
  <line x1="0" y1="348" x2="300" y2="348" stroke="#C9B37E" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>

  <!-- Standing, overhand grip (knuckles up), arms extended down -->
  <circle cx="150" cy="72" r="20" fill="#2A1810"/>
  <ellipse cx="150" cy="57" rx="20" ry="13" fill="#111"/>
  <rect x="143" y="90" width="14" height="16" rx="4" fill="#2A1810"/>
  <rect x="130" y="104" width="40" height="74" rx="6" fill="#2A1810"/>
  <rect x="128" y="175" width="44" height="42" rx="6" fill="#C9B37E"/>
  <rect x="128" y="214" width="20" height="88" rx="5" fill="#2A1810"/>
  <rect x="152" y="214" width="20" height="88" rx="5" fill="#2A1810"/>
  <rect x="129" y="300" width="17" height="48" rx="5" fill="#2A1810"/>
  <rect x="153" y="300" width="17" height="48" rx="5" fill="#2A1810"/>

  <!-- Arms down - overhand (knuckles facing outward) -->
  <rect x="108" y="104" width="22" height="108" rx="7" fill="#2A1810"/>
  <rect x="170" y="104" width="22" height="108" rx="7" fill="#2A1810"/>
  <!-- Knuckle detail (small rounded bumps on top of hand) -->
  <ellipse cx="119" cy="214" rx="13" ry="8" fill="#2A1810"/>
  <ellipse cx="181" cy="214" rx="13" ry="8" fill="#2A1810"/>
  <!-- Knuckle dots -->
  <circle cx="113" cy="212" r="2.5" fill="#3A2820"/>
  <circle cx="118" cy="212" r="2.5" fill="#3A2820"/>
  <circle cx="123" cy="212" r="2.5" fill="#3A2820"/>
  <circle cx="175" cy="212" r="2.5" fill="#3A2820"/>
  <circle cx="180" cy="212" r="2.5" fill="#3A2820"/>
  <circle cx="185" cy="212" r="2.5" fill="#3A2820"/>

  <!-- Barbell at hip level, overhand grip indicated -->
  <line x1="62" y1="218" x2="238" y2="218" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <circle cx="69" cy="218" r="14" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="69" cy="218" r="7" fill="#666"/>
  <circle cx="231" cy="218" r="14" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="231" cy="218" r="7" fill="#666"/>

  <!-- Overhand grip label -->
  <text x="150" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#C9B37E" opacity="0.8">overhand grip</text>

  <text x="150" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B7355" letter-spacing="1">STEP 1 — OVERHAND GRIP</text>
</svg>
